<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton-Raphson Load Flow Guide</title>
    <style>
        /* Reset margins and make the page take full height */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: #333; /* Dark background for modern look */
        }
        
        /* Professional Header */
        header {
            background-color: #0066cc; /* Matches your LaTeX mainblue */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        
        header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .download-btn {
            background-color: white;
            color: #0066cc;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #e6e6e6;
        }

        /* PDF Viewer Container */
        .pdf-container {
            flex-grow: 1; /* Takes up the rest of the screen */
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ Power Systems: Newton-Raphson Load Flow</h1>
        <!-- Direct download link for mobile users -->
        <a href="Newton_Raphson_Guide.pdf" class="download-btn" download>📥 Download PDF</a>
    </header>

    <div class="pdf-container">
        <!-- Embeds the PDF directly into the web page -->
        <embed src="Newton_Raphson_Guide.pdf" type="application/pdf" width="100%" height="100%">
    </div>

</body>
</html>
